<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ortho">
<meta name="theme-color" content="#1a7fd4">
<title>Ortho Record</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="loading-ov" id="loading"><div class="spinner"></div><div style="color:var(--muted);font-size:.95rem">Ortho Record</div></div>

<div id="auth-screen">
  <div class="auth-logo">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="7" fill="#1a7fd4" opacity=".9"/>
      <circle cx="48" cy="12" r="7" fill="#1a7fd4" opacity=".9"/>
      <circle cx="12" cy="48" r="7" fill="#1a7fd4" opacity=".9"/>
      <circle cx="48" cy="48" r="7" fill="#1a7fd4" opacity=".9"/>
      <rect x="18" y="26" width="24" height="8" rx="4" fill="#1a7fd4"/>
      <rect x="26" y="18" width="8" height="24" rx="4" fill="#1a7fd4"/>
    </svg>
  </div>
  <div class="auth-title">Ortho Record</div>
  <div class="auth-sub">骨科手術紀錄管理系統<br>請使用 Google 帳號登入</div>
  <button class="btn-google" onclick="AUTH.signIn()">
    <img src="https://www.google.com/favicon.ico" alt="">使用 Google 帳號登入
  </button>
</div>

<div id="app" style="display:none">

  <div id="header">
    <div style="width:36px"></div>
    <div class="hdr-actions">
      <button class="hdr-btn" onclick="APP.toggleSearch()" title="搜尋" id="search-btn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </button>
      <button class="hdr-btn" onclick="APP.refresh()" title="重新整理">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="hdr-btn hdr-add-btn" id="hdr-add-btn" style="display:none" onclick="APP.fabClick()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="hdr-btn" onclick="AUTH.signOut()" title="登出">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div id="search-bar">
    <input id="search-input" type="text" placeholder="搜尋..." oninput="APP.onSearch(this.value)">
    <button class="search-clear" onclick="APP.toggleSearch()">✕</button>
  </div>

  <!-- Surgery sub-tabs -->
  <div class="sub-tabs" id="sub-sx" style="display:none">
    <button class="sub-tab active" data-sub="sxList">手術紀錄</button>
    <button class="sub-tab" data-sub="track">追蹤</button>
  </div>

  <!-- Material sub-tabs -->
  <div class="sub-tabs" id="sub-mat" style="display:none">
    <button class="sub-tab active" data-sub="matRec">醫材記錄</button>
    <button class="sub-tab" data-sub="selfPay">自費醫材</button>
    <button class="sub-tab" data-sub="opCode">代碼</button>
    <button class="sub-tab" data-sub="codeRec">代碼紀錄</button>
    <button class="sub-tab" data-sub="estimate">預估</button>
  </div>

  <div id="content">

    <!-- Surgery Page -->
    <div id="pg-surgery" class="page active">
      <div class="sub-page" id="pg-sx-list">
        <div class="sx-wrap">
          <table class="sx-table">
            <thead><tr>
              <th>日期</th><th>院區</th><th>姓名</th><th>類型</th>
              <th>名稱</th><th>部位</th><th>骨材</th><th>備註</th>
            </tr></thead>
            <tbody id="sx-list-body"><tr><td colspan="8" class="load-msg">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="sub-page" id="pg-track" style="display:none">
        <div class="sx-wrap">
          <table class="sx-table">
            <thead><tr>
              <th>日期</th><th>院區</th><th>姓名</th><th>類型</th>
              <th>名稱</th><th>部位</th><th>骨材</th><th>備註</th>
            </tr></thead>
            <tbody id="track-list-body"><tr><td colspan="8" class="load-msg">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Material Page — swipeable slides -->
    <div id="pg-material" class="page">
      <div id="mat-swipe-container">
        <div id="mat-swipe-inner">

          <!-- Slide 0: 醫材記錄 -->
          <div class="mat-slide" id="pg-mat-rec">
            <div class="list-content">
              <div class="col-hdr-row">
                <span class="dot-ph"></span>
                <span class="th col-brand">廠牌</span>
                <span class="th col-product">產品</span>
                <span class="th col-qty" style="text-align:center">數量</span>
                <span class="th col-price" style="text-align:right">單價</span>
                <span style="width:32px;flex-shrink:0"></span>
              </div>
              <div id="mat-rec-list"></div>
            </div>
          </div>

          <!-- Slide 1: 自費醫材 -->
          <div class="mat-slide" id="pg-selfpay">
            <div class="list-content">
              <div class="col-hdr-row">
                <span class="th col-brand">廠牌</span>
                <span class="th col-product">產品</span>
                <span style="width:32px;flex-shrink:0"></span>
                <span class="th col-price" style="text-align:right">單價</span>
                <span class="th col-hosp" style="text-align:right">醫院</span>
              </div>
              <div id="selfpay-list"></div>
            </div>
          </div>

          <!-- Slide 2: 代碼 -->
          <div class="mat-slide" id="pg-opcode">
            <div class="list-content">
              <div class="col-hdr-row">
                <span class="th col-code">代碼</span>
                <span class="th col-product">術式</span>
                <span style="width:32px;flex-shrink:0"></span>
                <span class="th col-price" style="text-align:right">單價</span>
              </div>
              <div id="opcode-list"></div>
            </div>
          </div>

          <!-- Slide 3: 代碼紀錄 -->
          <div class="mat-slide" id="pg-code-rec">
            <div class="list-content">
              <div class="col-hdr-row">
                <span class="dot-ph"></span>
                <span class="th col-product">術式</span>
                <span class="th col-code">代碼</span>
                <span class="th col-price" style="text-align:right">單價</span>
                <span class="th col-qty" style="text-align:center">量</span>
                <span class="th col-area" style="text-align:right">院區</span>
              </div>
              <div id="code-rec-list"></div>
            </div>
          </div>

          <!-- Slide 4: 預估 -->
          <div class="mat-slide" id="pg-estimate">
            <div class="est-table-wrap">
              <table class="est-table">
                <thead id="est-thead"><tr><th>項目</th></tr></thead>
                <tbody id="est-tbody"></tbody>
              </table>
            </div>
          </div>

        </div><!-- /mat-swipe-inner -->
      </div><!-- /mat-swipe-container -->
    </div><!-- /pg-material -->

    <!-- Clinic Page -->
    <div id="pg-clinic" class="page">
      <div class="list-content" id="clinic-content"></div>
    </div>

  </div><!-- /content -->

  <div id="bottom-tabs">
    <button class="tab-btn" data-tab="material">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="2" width="6" height="3" rx="1"/><path d="M16 2h2a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h2"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="18" x2="12" y2="18"/></svg>醫材
    </button>
    <button class="tab-btn active" data-tab="surgery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 4L8.5 15.5"/><path d="M8.5 15.5L5 19c-.8.8-2 .8-2.8 0-.8-.8-.8-2 0-2.8l3.5-3.5"/><path d="M15 4h5v5"/><path d="M8.5 15.5L15 9"/></svg>手術紀錄
    </button>
    <button class="tab-btn" data-tab="clinic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 2l4 4-2 2-4-4z"/><path d="M14.5 5.5l4 4"/><path d="M3 21l9-9"/><path d="M10.5 13.5l-3 3"/><path d="M7 10l7 7"/><line x1="2" y1="22" x2="6" y2="18"/></svg>門診
    </button>
  </div>

</div>

<button class="fab" id="fab" style="display:flex">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>
<div class="toast" id="toast"></div>

<!-- DETAIL MODAL -->
<div class="modal-bd" id="modal-detail" onclick="if(event.target===this)APP.closeModal('modal-detail')">
<div class="modal-sheet">
  <div class="modal-handle"></div>
  <div class="modal-title" id="detail-title">詳情</div>
  <div id="detail-body"></div>
  <div class="detail-actions">
    <button class="btn-del" onclick="APP.deleteDetail()">🗑 刪除</button>
    <button class="btn-cancel" onclick="APP.closeModal('modal-detail')">關閉</button>
    <button class="btn-save" id="detail-edit-btn" onclick="APP.openEdit()">✏️ 修改</button>
  </div>
</div>
</div>

<!-- EDIT MODALS -->
<div class="modal-bd" id="modal-edit-sx" onclick="if(event.target===this)APP.closeModal('modal-edit-sx')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">修改手術紀錄</div>
  <div class="fg"><label class="fg-label">日期</label><input class="f-input" type="text" id="es-date"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">院區</label><input class="f-input" type="text" id="es-area"></div>
    <div class="fg"><label class="fg-label">類型</label><input class="f-input" type="text" id="es-type"></div>
  </div>
  <div class="fg"><label class="fg-label">姓名</label><input class="f-input" type="text" id="es-name"></div>
  <div class="fg"><label class="fg-label">手術名稱</label><input class="f-input" type="text" id="es-opname"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">部位</label><input class="f-input" type="text" id="es-loc"></div>
    <div class="fg"><label class="fg-label">骨材</label><input class="f-input" type="text" id="es-implant"></div>
  </div>
  <div class="fg"><label class="fg-label">備註</label><input class="f-input" type="text" id="es-note"></div>
  <div class="modal-actions"><button class="btn-cancel" onclick="APP.closeModal('modal-edit-sx')">取消</button><button class="btn-save" onclick="APP.saveEdit()">儲存</button></div>
</div></div>

<div class="modal-bd" id="modal-edit-track" onclick="if(event.target===this)APP.closeModal('modal-edit-track')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">修改追蹤紀錄</div>
  <div class="fg"><label class="fg-label">日期</label><input class="f-input" type="text" id="et-date"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">院區</label><input class="f-input" type="text" id="et-area"></div>
    <div class="fg"><label class="fg-label">類型</label><input class="f-input" type="text" id="et-type"></div>
  </div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">病歷號</label><input class="f-input" type="text" id="et-mrn"></div>
    <div class="fg"><label class="fg-label">診所ID</label><input class="f-input" type="text" id="et-clinicid"></div>
  </div>
  <div class="fg"><label class="fg-label">姓名</label><input class="f-input" type="text" id="et-name"></div>
  <div class="fg"><label class="fg-label">手術名稱</label><input class="f-input" type="text" id="et-opname"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">部位</label><input class="f-input" type="text" id="et-loc"></div>
    <div class="fg"><label class="fg-label">骨材</label><input class="f-input" type="text" id="et-implant"></div>
  </div>
  <div class="fg"><label class="fg-label">備註</label><input class="f-input" type="text" id="et-note"></div>
  <div class="modal-actions"><button class="btn-cancel" onclick="APP.closeModal('modal-edit-track')">取消</button><button class="btn-save" onclick="APP.saveEdit()">儲存</button></div>
</div></div>

<div class="modal-bd" id="modal-edit-mat" onclick="if(event.target===this)APP.closeModal('modal-edit-mat')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">修改骨材記錄</div>
  <div class="fg"><label class="fg-label">廠牌</label><input class="f-input" type="text" id="em-brand"></div>
  <div class="fg"><label class="fg-label">產品</label><input class="f-input" type="text" id="em-product"></div>
  <div class="fg"><label class="fg-label">日期</label><input class="f-input" type="text" id="em-date"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">單價</label><input class="f-input" type="number" id="em-price"></div>
    <div class="fg"><label class="fg-label">數量</label><input class="f-input" type="number" id="em-qty" min="1"></div>
  </div>
  <div class="fg">
    <label class="fg-label">Done</label>
    <input type="hidden" id="em-done-val" value="false">
    <div class="chip-row">
      <button class="chip on" id="em-done-n" onclick="APP.toggleDone('false')">N 未完成</button>
      <button class="chip" id="em-done-y" onclick="APP.toggleDone('true')">Y 已完成</button>
    </div>
  </div>
  <div class="modal-actions"><button class="btn-cancel" onclick="APP.closeModal('modal-edit-mat')">取消</button><button class="btn-save" onclick="APP.saveEdit()">儲存</button></div>
</div></div>

<div class="modal-bd" id="modal-edit-selfpay" onclick="if(event.target===this)APP.closeModal('modal-edit-selfpay')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">修改自費醫材</div>
  <div class="fg"><label class="fg-label">廠牌</label><input class="f-input" type="text" id="esp-brand"></div>
  <div class="fg"><label class="fg-label">產品</label><input class="f-input" type="text" id="esp-product"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">單價</label><input class="f-input" type="number" id="esp-price"></div>
    <div class="fg"><label class="fg-label">醫院</label><input class="f-input" type="text" id="esp-hosp"></div>
  </div>
  <div class="modal-actions"><button class="btn-cancel" onclick="APP.closeModal('modal-edit-selfpay')">取消</button><button class="btn-save" onclick="APP.saveEdit()">儲存</button></div>
</div></div>

<div class="modal-bd" id="modal-edit-opcode" onclick="if(event.target===this)APP.closeModal('modal-edit-opcode')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">修改 OP 代碼</div>
  <div class="fg"><label class="fg-label">代碼</label><input class="f-input" type="text" id="eoc-code"></div>
  <div class="fg"><label class="fg-label">術式</label><input class="f-input" type="text" id="eoc-name"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">單價</label><input class="f-input" type="number" id="eoc-price"></div>
    <div class="fg"><label class="fg-label">院區</label><input class="f-input" type="text" id="eoc-area"></div>
  </div>
  <div class="modal-actions"><button class="btn-cancel" onclick="APP.closeModal('modal-edit-opcode')">取消</button><button class="btn-save" onclick="APP.saveEdit()">儲存</button></div>
</div></div>

<div class="modal-bd" id="modal-edit-coderec" onclick="if(event.target===this)APP.closeModal('modal-edit-coderec')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">修改代碼紀錄</div>
  <div class="fg"><label class="fg-label">術式</label><input class="f-input" type="text" id="ecr-name"></div>
  <div class="fg"><label class="fg-label">代碼</label><input class="f-input" type="text" id="ecr-code"></div>
  <div class="fg"><label class="fg-label">日期</label><input class="f-input" type="text" id="ecr-date"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">單價</label><input class="f-input" type="number" id="ecr-price"></div>
    <div class="fg"><label class="fg-label">數量</label><input class="f-input" type="number" id="ecr-qty" min="1"></div>
  </div>
  <div class="fg"><label class="fg-label">院區</label><input class="f-input" type="text" id="ecr-area"></div>
  <div class="modal-actions"><button class="btn-cancel" onclick="APP.closeModal('modal-edit-coderec')">取消</button><button class="btn-save" onclick="APP.saveEdit()">儲存</button></div>
</div></div>

<div class="modal-bd" id="modal-edit-clinic" onclick="if(event.target===this)APP.closeModal('modal-edit-clinic')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">修改門診記錄</div>
  <div class="fg"><label class="fg-label">日期</label><input class="f-input" type="text" id="ecl-date"></div>
  <div class="fg"><label class="fg-label">產品</label><input class="f-input" type="text" id="ecl-product"></div>
  <div class="fg-row">
    <div class="fg"><label class="fg-label">單價</label><input class="f-input" type="number" id="ecl-price"></div>
    <div class="fg"><label class="fg-label">數量</label><input class="f-input" type="number" id="ecl-qty" min="1"></div>
  </div>
  <div class="modal-actions"><button class="btn-cancel" onclick="APP.closeModal('modal-edit-clinic')">取消</button><button class="btn-save" onclick="APP.saveEdit()">儲存</button></div>
</div></div>

<!-- NEW RECORD MODALS -->
<div class="modal-bd" id="modal-op" onclick="if(event.target===this)APP.closeModal('modal-op')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">新增手術紀錄</div>
  <div class="fg"><label class="fg-label">日期</label><input class="f-input" type="date" id="s-date"></div>
  <div class="fg">
    <label class="fg-label">院區</label><input type="hidden" id="s-area-val" value="中正">
    <div class="chip-row"><button class="chip area on" onclick="APP.selectArea(this,'中正')">中正</button><button class="chip area" onclick="APP.selectArea(this,'右昌')">右昌</button></div>
  </div>
  <div class="fg"><label class="fg-label">病歷號</label><input class="f-input" type="text" id="s-mrn" placeholder="選填"></div>
  <div class="fg" id="s-clinicid-wrap" style="display:none"><label class="fg-label">診所 ID</label><input class="f-input" type="text" id="s-clinicid" placeholder="右昌診所ID"></div>
  <div class="fg"><label class="fg-label">病患姓名</label><input class="f-input" type="text" id="s-name" placeholder="輸入姓名"></div>
  <div class="fg">
    <label class="fg-label">類型</label><input type="hidden" id="s-type-val" value="Joint">
    <div class="chip-row wrap">
      <button class="chip on" onclick="APP.selectType(this,'Joint')">Joint</button>
      <button class="chip" onclick="APP.selectType(this,'Sports')">Sports</button>
      <button class="chip" onclick="APP.selectType(this,'Trauma')">Trauma</button>
      <button class="chip" onclick="APP.selectType(this,'Spine')">Spine</button>
      <button class="chip" onclick="APP.selectType(this,'Tumor')">Tumor</button>
      <button class="chip" onclick="APP.selectType(this,'Hand')">Hand</button>
      <button class="chip" onclick="APP.selectType(this,'ROI')">ROI</button>
    </div>
  </div>
  <div class="fg"><label class="fg-label">手術名稱</label><select class="f-sel" id="s-opname"><option value="">請先選擇類型</option></select></div>
  <div class="fg"><label class="fg-label">部位</label><input class="f-input" type="text" id="s-location" placeholder="如 Rt、Lt、L4-5"></div>
  <div class="fg">
    <label class="fg-label">骨材</label><input type="hidden" id="s-bone-val">
    <div class="bone-grid" id="s-bone-wrap"><div style="color:var(--muted);font-size:.88rem">請先選擇類型</div></div>
  </div>
  <div class="fg"><label class="fg-label">備註</label><input class="f-input" type="text" id="s-note" placeholder="選填"></div>
  <div class="modal-actions"><button class="btn-cancel" onclick="APP.closeModal('modal-op')">取消</button><button class="btn-save" onclick="APP.saveOp()">儲存</button></div>
</div></div>

<div class="modal-bd" id="modal-track" onclick="if(event.target===this)APP.closeModal('modal-track')">
<div class="modal-sheet">
  <div class="modal-handle"></div><div class="modal-title">新增追蹤紀錄</div>
  <div class="fg"><label class="fg-label">日期</label><input class="f-input" type="date" id="tk-date"></div>
  <div class="fg-row">
