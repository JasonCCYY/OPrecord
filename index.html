<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ortho">
  <meta name="theme-color" content="#0f1923">
  <title>Ortho Record</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Ortho Record</div>
</div>

<!-- Auth Screen -->
<div id="auth-screen" style="display:none">
  <div class="auth-logo">🦴</div>
  <div class="auth-title">Ortho Record</div>
  <div class="auth-sub">骨科手術紀錄管理系統<br>請使用 Google 帳號登入以存取資料</div>
  <button class="btn-google" onclick="AUTH.signIn()">
    <img src="https://www.google.com/favicon.ico" alt="Google">
    使用 Google 帳號登入
  </button>
</div>

<!-- Main App -->
<div id="app" style="display:none">

  <!-- Header -->
  <div id="header">
    <div>
      <div class="header-title" id="header-title">手術紀錄</div>
      <div class="header-month" id="header-month"></div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="APP.refresh()" title="重新載入">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
      <button class="header-btn" onclick="AUTH.signOut()" title="登出">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- Material Sub Tabs -->
  <div class="sub-tabs" id="sub-material" style="display:none">
    <button class="sub-tab active" data-sub="matRecord">醫材記錄</button>
    <button class="sub-tab" data-sub="selfPay">自費醫材</button>
    <button class="sub-tab" data-sub="opCode">代碼</button>
    <button class="sub-tab" data-sub="codeRecord">代碼紀錄</button>
    <button class="sub-tab" data-sub="estimate">預估</button>
  </div>

  <!-- Clinic Sub Tabs -->
  <div class="sub-tabs" id="sub-clinic" style="display:none">
    <button class="sub-tab active" data-sub="clinicPrice">自費項目</button>
    <button class="sub-tab" data-sub="clinicRecord">門診記錄</button>
  </div>

  <!-- Content Area -->
  <div id="content">

    <!-- ━━━ Surgery Page ━━━ -->
    <div id="page-surgery" class="page active">
      <div id="surgery-wrap"></div>
    </div>

    <!-- ━━━ Material Record ━━━ -->
    <div id="page-mat-record" class="page">
      <div class="table-header">
        <div class="th th-brand">廠牌</div>
        <div class="th th-product">產品</div>
        <div class="th th-qty">量</div>
        <div class="th th-price">單價</div>
        <div class="th th-action"></div>
      </div>
      <div id="mat-record-list"></div>
    </div>

    <!-- ━━━ Self-pay ━━━ -->
    <div id="page-selfpay" class="page">
      <div class="table-header">
        <div class="th" style="width:50px">廠牌</div>
        <div class="th" style="flex:1">產品</div>
        <div class="th" style="width:80px;text-align:right">單價</div>
        <div class="th" style="width:60px;text-align:right">醫院</div>
      </div>
      <div id="selfpay-list"></div>
    </div>

    <!-- ━━━ OP Code ━━━ -->
    <div id="page-opcode" class="page">
      <div class="table-header">
        <div class="th" style="width:80px;font-family:'JetBrains Mono',monospace">代碼</div>
        <div class="th" style="flex:1">術式</div>
        <div class="th" style="width:72px;text-align:right">單價</div>
      </div>
      <div id="opcode-list"></div>
    </div>

    <!-- ━━━ Code Record ━━━ -->
    <div id="page-code-record" class="page">
      <div class="table-header" style="display:grid;grid-template-columns:90px 1fr 80px 40px 50px;gap:6px">
        <div class="th">術式</div>
        <div class="th">代碼</div>
        <div class="th" style="text-align:right">單價</div>
        <div class="th" style="text-align:center">量</div>
        <div class="th" style="text-align:right">院區</div>
      </div>
      <div id="code-record-list"></div>
    </div>

    <!-- ━━━ Estimate ━━━ -->
    <div id="page-estimate" class="page">
      <div class="estimate-header">
        <div class="th">月份</div>
        <div class="th" style="text-align:right">預估</div>
        <div class="th" style="text-align:right">醫材</div>
        <div class="th" style="text-align:right">中正</div>
      </div>
      <div id="estimate-list"></div>
    </div>

    <!-- ━━━ Clinic Price List ━━━ -->
    <div id="page-clinic-price" class="page">
      <div id="clinic-price-list"></div>
    </div>

    <!-- ━━━ Clinic Records ━━━ -->
    <div id="page-clinic-record" class="page">
      <div class="table-header">
        <div class="th" style="width:52px">日期</div>
        <div class="th" style="flex:1">產品</div>
        <div class="th" style="width:28px;text-align:center">量</div>
        <div class="th" style="width:72px;text-align:right">總價</div>
      </div>
      <div id="clinic-record-list"></div>
    </div>

  </div><!-- /content -->

  <!-- Bottom Tabs -->
  <div id="bottom-tabs">
    <button class="tab-btn" data-tab="material">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 7h18M3 12h18M3 17h18"/>
      </svg>
      醫材
    </button>
    <button class="tab-btn active" data-tab="surgery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      手術紀錄
    </button>
    <button class="tab-btn" data-tab="clinic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      門診
    </button>
  </div>

</div><!-- /app -->

<!-- FAB -->
<button class="fab" id="fab" style="display:none">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ━━━ MODALS ━━━ -->

<!-- Add Surgery Modal -->
<div class="modal-backdrop" id="modal-surgery" onclick="if(event.target===this)APP.closeModal('modal-surgery')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">新增手術紀錄</div>

    <!-- Date -->
    <div class="form-group">
      <div class="form-label">日期</div>
      <input class="form-input" type="date" id="s-date">
    </div>

    <!-- Area chips -->
    <div class="form-group">
      <div class="form-label">院區</div>
      <input type="hidden" id="s-area-val" value="中正">
      <div class="chip-row">
        <button class="area-chip active" data-area="中正" onclick="APP.selectArea(this,'中正')">中正</button>
        <button class="area-chip" data-area="右昌" onclick="APP.selectArea(this,'右昌')">右昌</button>
      </div>
    </div>

    <!-- Patient name -->
    <div class="form-group">
      <div class="form-label">病患姓名</div>
      <input class="form-input" type="text" id="s-name" placeholder="輸入姓名">
    </div>

    <!-- Type chips -->
    <div class="form-group">
      <div class="form-label">類型</div>
      <input type="hidden" id="s-type-val" value="Joint">
      <div class="chip-row chip-row--wrap">
        <button class="type-chip active" data-type="Joint" onclick="APP.selectType(this,'Joint')">Joint</button>
        <button class="type-chip" data-type="Sports" onclick="APP.selectType(this,'Sports')">Sports</button>
        <button class="type-chip" data-type="Trauma" onclick="APP.selectType(this,'Trauma')">Trauma</button>
        <button class="type-chip" data-type="Spine" onclick="APP.selectType(this,'Spine')">Spine</button>
        <button class="type-chip" data-type="Tumor" onclick="APP.selectType(this,'Tumor')">Tumor</button>
        <button class="type-chip" data-type="Hand" onclick="APP.selectType(this,'Hand')">Hand</button>
        <button class="type-chip" data-type="ROI" onclick="APP.selectType(this,'ROI')">ROI</button>
      </div>
    </div>

    <!-- OP Name (dynamic by type) -->
    <div class="form-group">
      <div class="form-label">名稱</div>
      <select class="form-select" id="s-opname">
        <option value="">載入中...</option>
      </select>
    </div>

    <!-- Location -->
    <div class="form-group">
      <div class="form-label">部位</div>
      <input class="form-input" type="text" id="s-location" placeholder="如 Rt、Lt、L4-5">
    </div>

    <!-- Implant checkboxes (dynamic by type) -->
    <div class="form-group">
      <div class="form-label">骨材</div>
      <input type="hidden" id="s-implant-val" value="">
      <div class="bone-grid" id="s-implant-wrap">
        <div style="color:var(--text-muted);font-size:0.8rem">請先選擇類型</div>
      </div>
    </div>

    <!-- Note -->
    <div class="form-group">
      <div class="form-label">備註</div>
      <input class="form-input" type="text" id="s-note" placeholder="選填">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="APP.closeModal('modal-surgery')">取消</button>
      <button class="btn-save" onclick="APP.saveSurgery()">儲存</button>
    </div>
  </div>
</div>

<!-- Add Material Record Modal -->
<div class="modal-backdrop" id="modal-mat" onclick="if(event.target===this)APP.closeModal('modal-mat')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">新增醫材紀錄</div>
    <div class="form-group">
      <div class="form-label">日期</div>
      <input class="form-input" type="date" id="m-date">
    </div>
    <div class="form-group">
      <div class="form-label">廠牌</div>
      <input class="form-input" type="text" id="m-brand" placeholder="廠牌名稱">
    </div>
    <div class="form-group">
      <div class="form-label">產品</div>
      <input class="form-input" type="text" id="m-product" placeholder="產品名稱">
    </div>
    <div class="form-group">
      <div class="form-label">數量</div>
      <input class="form-input" type="number" id="m-qty" value="1" min="1">
    </div>
    <div class="form-group">
      <div class="form-label">單價</div>
      <input class="form-input" type="number" id="m-price" placeholder="0">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="APP.closeModal('modal-mat')">取消</button>
      <button class="btn-save" onclick="APP.saveMat()">儲存</button>
    </div>
  </div>
</div>

<!-- Add Code Record Modal -->
<div class="modal-backdrop" id="modal-code" onclick="if(event.target===this)APP.closeModal('modal-code')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">新增代碼紀錄</div>
    <div class="form-group">
      <div class="form-label">日期</div>
      <input class="form-input" type="date" id="c-date">
    </div>
    <div class="form-group">
      <div class="form-label">術式名稱</div>
      <input class="form-input" type="text" id="c-name" placeholder="術式">
    </div>
    <div class="form-group">
      <div class="form-label">代碼</div>
      <input class="form-input" type="text" id="c-code" placeholder="如 64164">
    </div>
    <div class="form-group">
      <div class="form-label">單價</div>
      <input class="form-input" type="number" id="c-price" placeholder="0">
    </div>
    <div class="form-group">
      <div class="form-label">數量</div>
      <input class="form-input" type="number" id="c-qty" value="1" min="1">
    </div>
    <div class="form-group">
      <div class="form-label">院區</div>
      <select class="form-select" id="c-area">
        <option value="中正">中正</option>
        <option value="右昌">右昌</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="APP.closeModal('modal-code')">取消</button>
      <button class="btn-save" onclick="APP.saveCode()">儲存</button>
    </div>
  </div>
</div>

<!-- Add Clinic Record Modal -->
<div class="modal-backdrop" id="modal-clinic" onclick="if(event.target===this)APP.closeModal('modal-clinic')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">新增門診紀錄</div>
    <div class="form-group">
      <div class="form-label">日期</div>
      <input class="form-input" type="date" id="cl-date">
    </div>
    <div class="form-group">
      <div class="form-label">產品</div>
      <select class="form-select" id="cl-product" onchange="APP.calcClinicTotal()">
        <option value="">選擇產品</option>
        <option value="增生">增生</option>
        <option value="玻尿酸">玻尿酸</option>
        <option value="震波">震波</option>
        <option value="PRP">PRP</option>
        <option value="外泌體">外泌體</option>
        <option value="門診護具">門診護具</option>
      </select>
    </div>
    <div class="form-group">
      <div class="form-label">數量</div>
      <input class="form-input" type="number" id="cl-qty" value="1" min="1" oninput="APP.calcClinicTotal()">
    </div>
    <div class="form-group">
      <div class="form-label">總價</div>
      <input class="form-input" type="number" id="cl-total" placeholder="自動計算">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="APP.closeModal('modal-clinic')">取消</button>
      <button class="btn-save" onclick="APP.saveClinic()">儲存</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/sheets.js"></script>
<script src="js/app.js"></script>
</body>
</html>
